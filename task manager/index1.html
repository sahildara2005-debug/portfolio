<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Interactive Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header & Theme Toggle -->
        <header>
            <h1>Task Matrix</h1>
            <button id="themeToggle" class="btn btn-secondary" aria-label="Toggle Dark Mode">🌓 Toggle Theme</button>
        </header>

        <!-- Step 1: Task Statistics Display -->
        <section class="stats-container" aria-label="Task Statistics">
            <div class="stat-card">
                <span class="stat-value" id="totalTasks">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="activeTasks">0</span>
                <span class="stat-label">Active</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="completedTasks">0</span>
                <span class="stat-label">Completed</span>
            </div>
        </section>

        <!-- Step 1 & 5: Input Form with Priority & Due Date -->
        <section class="form-container">
            <form id="taskForm">
                <div class="input-group main-input">
                    <input type="text" id="taskInput" placeholder="What needs to be done? (Press Enter)" required autocomplete="off">
                </div>
                <div class="form-modifiers">
                    <div class="input-sub-group">
                        <label for="taskPriority">Priority:</label>
                        <select id="taskPriority">
                            <option value="low">🟢 Low</option>
                            <option value="medium" selected>🟡 Medium</option>
                            <option value="high">🔴 High</option>
                        </select>
                    </div>
                    <div class="input-sub-group">
                        <label for="taskDueDate">Due Date:</label>
                        <input type="date" id="taskDueDate">
                    </div>
                    <button type="submit" class="btn btn-primary">Add Task</button>
                </div>
            </form>
        </section>

        <!-- Step 2 & 3: Filter & Search Controls -->
        <section class="controls-container">
            <div class="search-box">
                <input type="text" id="searchBar" placeholder="🔍 Search tasks...">
            </div>
            <div class="filter-group" id="filterControls">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
        </section>

        <!-- Step 1 & 5: Task List Container -->
        <main>
            <ul id="taskList" class="task-list"></ul>
        </main>

        <!-- Step 4: Utilities & Persistence Management -->
        <footer class="utilities-container">
            <button id="clearCompletedBtn" class="btn btn-danger">🧹 Clear Completed</button>
            <div class="backup-group">
                <button id="backupBtn" class="btn btn-secondary">💾 Backup JSON</button>
                <label for="restoreFile" class="btn btn-secondary label-btn">📂 Restore Backup</label>
                <input type="file" id="restoreFile" accept=".json" style="display: none;">
            </div>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
